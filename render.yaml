services:
  # Backend API
  - type: web
    name: tamatovest-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tamatovest-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://tamatovest.onrender.com
      - key: PORT
        value: 5000

  # Frontend static site
  - type: web
    name: tamatovest
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        value: https://tamatovest-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: tamatovest-db
    databaseName: tamatovest
    user: tamatovest
    plan: free
